<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Casino Fénix</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* =========================================================
           ESTILOS BASE Y FORMATO CELULAR
           ========================================================= */
        body { margin: 0; padding: 0; background-color: #0b0f19; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        
        /* Contenedor principal anclado a formato celular */
        .app-container { background-color: #111827; width: 100%; max-width: 380px; height: 100vh; max-height: 800px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden; border: 1px solid #1f2937; display: flex; flex-direction: column; position: relative; }
        
        .header { background-color: #1f2937; padding: 15px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #374151; z-index: 10; }
        .header-title { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        .badge-creditos { background-color: #ffaa00; color: #000; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-left: 5px; box-shadow: 0 0 8px rgba(255, 170, 0, 0.4); }

        .auth-body { padding: 40px 25px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; flex: 1; }
        .auth-body h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; color: white; }
        .input-dark { background-color: #1f2937; border: 1px solid #374151; color: white; padding: 12px 15px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; outline: none; transition: border 0.3s; }
        .input-dark:focus { border-color: #38bdf8; }
        .input-dark::placeholder { color: #64748b; }
        .btn-primary { background-color: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-text { background: none; border: none; color: #94a3b8; font-size: 13px; cursor: pointer; margin-top: 15px; text-decoration: underline; }
        .btn-logout { background-color: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* =========================================================
           ZONA DE CHAT Y BURBUJAS
           ========================================================= */
        #vista-chat { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background-color: #0b0f19; }
        .bubble-wrapper { display: flex; flex-direction: column; margin-bottom: 14px; width: 100%; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 13.5px; line-height: 1.4; word-wrap: break-word; }
        .bubble.bot { background-color: #1f2937; color: #cbd5e1; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #374151; }
        .bubble.admin { background-color: #1e3a8a; color: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #2563eb; }
        .bubble.cliente { background-color: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .status-text { font-size: 10px; color: #64748b; align-self: flex-end; margin-right: 5px; margin-top: 4px; font-weight: bold; }
        .status-text.visto { color: #38bdf8; }

        /* Barra de Input Inamovible */
        .chat-input-area { display: flex; align-items: center; gap: 8px; padding: 12px 15px; background-color: #111827; border-top: 1px solid #1f2937; width: 100%; box-sizing: border-box; }

        /* =========================================================
           MENÚS ESTILO CELULAR (Como las fotos 2 y 3)
           ========================================================= */
        .menu-container { padding: 15px; background-color: #0b0f19; border-top: 1px solid #1f2937; display: flex; flex-direction: column; gap: 10px; }
        .grid-2-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        .btn-action { background-color: #1f2937; border: 1px solid #374151; color: white; padding: 15px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-action:hover { background-color: #374151; }
        
        /* Botones Destacados */
        .btn-tienda { background: #7c3aed; border: none; color: white; }
        .btn-minijuegos { background: linear-gradient(90deg, #6366f1, #a855f7); border: none; color: white; }
        .btn-premium { background: linear-gradient(90deg, #1e3a8a, #3b82f6); border: none; color: white; }

        /* Bienvenida */
        .hero-welcome { background: #1f2937; padding: 15px; border-radius: 10px; border: 1px solid #374151; margin: 15px; text-align: center; color: #fff; }
        .hero-welcome h2 { margin: 0 0 5px 0; color: #38bdf8; font-size: 20px; }
        .hero-welcome p { font-size: 14px; margin: 0; opacity: 0.8; }

        .hidden { display: none !important; }

        /* =========================================================
           MODALES Y MINIJUEGOS (ESTILOS EMBEBIDOS SEGUROS)
           ========================================================= */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 330px; background: #111827; padding: 25px; border-radius: 16px; border: 1px solid #ffaa00; box-shadow: 0 0 30px rgba(255, 170, 0, 0.4); text-align: center; box-sizing: border-box; }
        .btn-spin { background: linear-gradient(90deg, #ff007f, #ffaa00); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 25px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255,170,0,0.3); }
        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

        .tienda-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .producto-card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .producto-precio { color: #f59e0b; font-weight: bold; margin-bottom: 10px; display: block; font-size: 16px; }

        /* Ruleta */
        .ruleta-container { position: relative; width: 280px; height: 280px; margin: 0 auto; }
        .ruleta-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 40px; color: #ffaa00; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        #ruleta-canvas { transition: transform 5s cubic-bezier(0.25, 0.1, 0.15, 1); width: 100%; height: 100%; border-radius: 50%; border: 3px solid #1f2937; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        /* Raspa */
        .raspa-grid-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin: 20px 0; }
        .raspa-block-card { width: 85px; height: 80px; background-color: #1f2937; border: 2px dashed #10b981; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s; box-sizing: border-box; }
        .raspa-block-card.scratched { background-color: #0b0f19; border-style: solid; border-color: #2563eb; }
        .raspa-block-card.others-revealed { background-color: #111827; border-style: solid; border-color: #374151; opacity: 0.65; }
        .raspa-cover-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #374151, #1f2937); display: flex; justify-content: center; align-items: center; color: #94a3b8; font-weight: bold; font-size: 22px; transition: opacity 0.4s; z-index: 2; }
        .raspa-prize-text { font-size: 10px; font-weight: bold; color: white; text-align: center; padding: 2px; line-height: 1.2; }
        .raspa-value-text { font-size: 11px; font-weight: bold; color: #38bdf8; margin-top: 3px; }
        /* Slots */
        .slot-machine { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .slot-reel { width: 70px; height: 90px; background-color: #1f2937; border: 2px solid #ffaa00; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 40px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        /* Cartas */
        .card-flip { width: 140px; height: 200px; margin: 20px auto; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #ffaa00; box-sizing: border-box; }
        .card-front { background: linear-gradient(135deg, #1f2937, #111827); color: #ffaa00; font-size: 60px; }
        .card-back { background-color: white; color: black; transform: rotateY(180deg); padding: 10px; }
        /* Moneda */
        .coin-flip { width: 150px; height: 150px; margin: 20px auto; background: radial-gradient(#fcd34d, #ca8a04); border-radius: 50%; border: 6px solid #fef08a; display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: bold; color: #713f12; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: transform 1.5s ease-out; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">
                <div class="status-dot"></div>
                <span id="header-title-text">Chat Asistencia</span>
                <span id="badge-creditos" class="badge-creditos hidden">🟡 <span id="txt-creditos">0</span> CR</span>
            </div>
            <button id="btn-cerrar-sesion" class="btn-logout hidden" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>

        <!-- VISTAS DE LOGIN -->
        <div id="vista-login" class="auth-body active">
            <h3>Acceso de Clientes</h3>
            <input type="text" id="login-user" class="input-dark" placeholder="Tu usuario de casino...">
            <input type="password" id="login-pass" class="input-dark" placeholder="Tu contraseña...">
            <button class="btn-primary" id="btn-login" onclick="validarAcceso()">Ingresar al Chat</button>
            <button class="btn-text" onclick="cambiarVista('registro')">¿No tenés cuenta? Crear usuario</button>
        </div>

        <div id="vista-registro" class="auth-body hidden">
            <h3>Crear Nuevo Usuario</h3>
            <input type="text" id="reg-user" class="input-dark" placeholder="Elegí tu nombre...">
            <input type="password" id="reg-pass" class="input-dark" placeholder="Elegí una contraseña...">
            <button class="btn-primary" id="btn-registro" style="background-color: #10b981;" onclick="registrarUsuario()">Crear Cuenta y Entrar</button>
            <button class="btn-text" onclick="cambiarVista('login')">Ya tengo cuenta. Ingresar.</button>
        </div>

        <!-- VISTA PRINCIPAL (CHAT + MENÚS) -->
        <div id="vista-chat" class="hidden">
            
            <div id="hero-welcome-container" class="hero-welcome" style="display: none;">
                <h2 id="welcome-name">¡Hola!</h2>
                <p>Bienvenido nuevamente a Fénix 🦅</p>
            </div>

            <!-- CHAT AREA -->
            <div class="chat-messages" id="messages-area" style="display: none;">
                <div style="text-align: center; color: #64748b; font-size: 12px; margin-top: 20px;">Conectando...</div>
            </div>
            
            <!-- MENÚ PRINCIPAL (IMAGEN 2) -->
            <div id="container-menu-options" class="menu-container" style="display: none;">
                <div class="grid-2-cols">
                    <button class="btn-action" onclick="seleccionarOpcion('Depósito')">💰 Cargar</button>
                    <button class="btn-action" onclick="seleccionarOpcion('Retiro')">💸 Retirar</button>
                </div>
                <div class="grid-2-cols">
                    <button class="btn-action" onclick="seleccionarOpcion('Soporte')">🛠️ Soporte</button>
                    <button class="btn-action" onclick="seleccionarOpcion('Referido')">🎁 Referí y GANÁ</button>
                </div>
                <button class="btn-action" onclick="abrirModal('cargar-creditos')">🟡 Cargar Créditos</button>
                <button class="btn-action btn-tienda" onclick="abrirTienda()">🛒 TIENDA DE BONOS</button>
                <button class="btn-action btn-minijuegos" onclick="mostrarSubMenuMinijuegos()">🎮 Minijuegos Diarios</button>
            </div>

            <!-- MENÚ MINIJUEGOS (IMAGEN 3) -->
            <div id="container-games-options" class="menu-container" style="display: none;">
                <div class="grid-3-cols">
                    <button class="btn-action" onclick="abrirModal('ruleta')">🎯 Ruleta</button>
                    <button class="btn-action" onclick="abrirModal('raspa')">🎫 Raspa</button>
                    <button class="btn-action" onclick="abrirModal('traga')">🍒 Slots</button>
                </div>
                <div class="grid-2-cols">
                    <button class="btn-action" onclick="abrirModal('cartas')">🃏 Cartas</button>
                    <button class="btn-action" onclick="abrirModal('moneda')">🪙 Cara/Cruz</button>
                </div>
                <button class="btn-action btn-premium" onclick="abrirSlotPremium()">💎 JUGAR SLOT PREMIUM 💎</button>
                <button class="btn-action" onclick="volverYLimpiarChat()">↩️ Volver</button>
            </div>

            <div id="container-deposit-options" class="menu-container" style="display: none;">
                <div class="grid-2-cols">
                    <button class="btn-action" onclick="ejecutarAccionDeposito('Subir Comprobante')">📁 Subir Comp.</button>
                    <button class="btn-action" onclick="ejecutarAccionDeposito('Reportar Pago')">📄 Reportar</button>
                </div>
                <button class="btn-action" onclick="volverYLimpiarChat()">↩️ Volver</button>
            </div>

            <!-- BARRA DE CHAT INAMOVIBLE (IMAGEN 1) -->
            <div id="container-chat-input" class="chat-input-area" style="display: none;">
                <button style="background: #ef4444; border: none; color: white; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; flex-shrink: 0;" onclick="volverYLimpiarChat()">⬅ Menú</button>
                <input type="text" id="client-raw-input" class="input-dark" style="margin: 0; flex-grow: 1; min-width: 0;" placeholder="Escribí acá...">
                <button class="btn-primary" style="margin: 0; padding: 12px 15px; flex-shrink: 0; width: auto;" onclick="enviarMensajeLibreCliente()">Enviar</button>
            </div>
        </div>
    </div>

    <!-- =========================================================
         MODALES DE MINIJUEGOS Y TIENDA
         ========================================================= -->
    <div id="modal-cargar-creditos" class="modal-overlay">
        <div class="modal-content" style="border-color: #ffaa00;">
            <h3 style="color:white; margin-top:0; font-size: 20px;">🟡 Comprar Créditos</h3>
            <p style="color: #64748b; font-size:12px; margin:5px 0 15px 0;">Transferí y enviá el comprobante.</p>
            <input type="number" id="input-creditos-monto" class="input-dark" placeholder="Monto transferido ($)...">
            <input type="url" id="input-creditos-url" class="input-dark" placeholder="URL comprobante...">
            <button class="btn-spin" style="background: #ffaa00; color: #000; margin-top:10px;" onclick="solicitarCargaCreditos()">ENVIAR REPORTE</button>
            <button class="btn-action btn-close-modal" style="margin-top:10px; width:100%;" onclick="cerrarModal('cargar-creditos')">Cancelar</button>
        </div>
    </div>

    <div id="modal-tienda" class="modal-overlay">
        <div class="modal-content" style="border-color: #7c3aed;">
            <h3 style="color:white; margin-top:0;">🛒 Tienda de Bonos</h3>
            <div class="tienda-grid"></div>
            <button class="btn-action" style="margin-top:20px; width:100%;" onclick="cerrarModal('tienda')">Cerrar</button>
        </div>
    </div>

    <div id="modal-ruleta" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color:white; margin-top:0; font-size: 22px;">🎰 Ruleta</h3>
            <div class="ruleta-container"><div class="ruleta-pointer">▼</div><canvas id="ruleta-canvas" width="280" height="280"></canvas></div>
            <button id="btn-spin-ruleta" class="btn-spin" onclick="jugarRuleta()">GIRAR</button>
            <button class="btn-action btn-close-modal hidden" style="margin-top:10px; width:100%;" onclick="cerrarModal('ruleta')">Volver</button>
        </div>
    </div>

    <div id="modal-raspa" class="modal-overlay">
        <div class="modal-content" style="border-color: #10b981;">
            <h3 style="color:white; margin-top:0; font-size: 22px;">🎫 Raspa y Gana</h3>
            <div class="raspa-grid-board" id="client-tablero-raspa"></div>
            <button class="btn-action btn-close-modal hidden" style="margin-top:15px; width:100%;" onclick="cerrarModal('raspa')">Volver</button>
        </div>
    </div>

    <div id="modal-traga" class="modal-overlay">
        <div class="modal-content" style="border-color: #ec4899;">
            <h3 style="color:white; margin-top:0; font-size: 22px;">🍒 Tragamonedas</h3>
            <div class="slot-machine">
                <div class="slot-reel" id="client-slot-1">🎰</div>
                <div class="slot-reel" id="client-slot-2">🎰</div>
                <div class="slot-reel" id="client-slot-3">🎰</div>
            </div>
            <button id="btn-spin-traga" class="btn-spin" style="background: linear-gradient(90deg, #ec4899, #8b5cf6);" onclick="jugarTragamonedas()">TIRAR PALANCA</button>
            <button class="btn-action btn-close-modal hidden" style="margin-top:10px; width:100%;" onclick="cerrarModal('traga')">Volver</button>
        </div>
    </div>

    <div id="modal-cartas" class="modal-overlay">
        <div class="modal-content" style="border-color: #f97316;">
            <h3 style="color:white; margin-top:0; font-size: 22px;">🃏 Carta Suerte</h3>
            <div class="card-flip" onclick="jugarCartas()">
                <div class="card-inner" id="client-card">
                    <div class="card-front">?</div>
                    <div class="card-back">
                        <div id="client-card-val" style="font-size:40px; font-weight:bold;">🃏</div>
                        <div id="client-card-desc" style="font-size:14px; margin-top:10px;"></div>
                    </div>
                </div>
            </div>
            <button class="btn-action btn-close-modal hidden" style="margin-top:10px; width:100%;" onclick="cerrarModal('cartas')">Volver</button>
        </div>
    </div>

    <div id="modal-moneda" class="modal-overlay">
        <div class="modal-content" style="border-color: #eab308;">
            <h3 style="color:white; margin-top:0; font-size: 22px;">🪙 Cara o Cruz</h3>
            <div class="coin-flip" id="client-coin" onclick="jugarMoneda()">🪙</div>
            <button class="btn-action btn-close-modal hidden" style="margin-top:10px; width:100%;" onclick="cerrarModal('moneda')">Volver</button>
        </div>
    </div>

    <!-- =========================================================
         LÓGICA JAVASCRIPT
         ========================================================= -->
    <script>
        const socket = io();
        const msgArea = document.getElementById('messages-area');
        window.usuarioLogueado = null; 

        let ruletaConfig = []; let raspaConfig = [];
        let currentRotation = 0; let raspaYaJugada = false;
        let tragaJugado = false; let cartasJugado = false; let monedaJugado = false;

        function cambiarVista(vista) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-registro').classList.add('hidden');
            document.getElementById('vista-chat').classList.add('hidden');
            document.getElementById('btn-cerrar-sesion').classList.add('hidden');

            if (vista === 'login') document.getElementById('vista-login').classList.remove('hidden');
            if (vista === 'registro') document.getElementById('vista-registro').classList.remove('hidden');
            if (vista === 'chat') {
                document.getElementById('vista-chat').classList.remove('hidden');
                document.getElementById('vista-chat').style.display = 'flex';
                document.getElementById('btn-cerrar-sesion').classList.remove('hidden');
            }
        }

        async function registrarUsuario() {
            const u = document.getElementById('reg-user').value.trim(); const p = document.getElementById('reg-pass').value.trim();
            if(!u || !p) return alert("Por favor, completá ambos campos.");
            const btn = document.getElementById('btn-registro'); btn.innerText = 'Creando...'; btn.disabled = true;

            try {
                const res = await fetch('/api/registrar-cliente', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: u, password: p }) });
                const data = await res.json();
                btn.innerText = 'Crear Cuenta y Entrar'; btn.disabled = false;
                if (data.exito) {
                    alert("¡Cuenta creada con éxito! Ingresando al chat...");
                    document.getElementById('login-user').value = u; document.getElementById('login-pass').value = p;
                    validarAcceso(); 
                } else alert(data.mensaje);
            } catch (e) { btn.innerText = 'Crear Cuenta y Entrar'; btn.disabled = false; alert("Error al registrarse."); }
        }

        function validarAcceso() {
            const u = document.getElementById('login-user').value.trim(); const p = document.getElementById('login-pass').value.trim();
            if (!u || !p) return alert('Ingresá usuario y contraseña.');
            const btn = document.getElementById('btn-login'); btn.innerText = 'Validando...'; btn.disabled = true;

            fetch('/api/validar-cliente', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: u, password: p }) })
            .then(res => res.json()).then(data => {
                btn.innerText = 'Ingresar al Chat'; btn.disabled = false;
                if(data.exito) {
                    window.usuarioLogueado = u; 
                    socket.emit('identificar_usuario', { usuario: u });
                } else alert('Usuario o contraseña incorrectos.');
            }).catch(err => { btn.innerText = 'Ingresar al Chat'; btn.disabled = false; alert('Error con el servidor.'); });
        }

        function cerrarSesion() {
            socket.disconnect(); socket.connect(); 
            window.usuarioLogueado = null;
            document.getElementById('login-user').value = ''; document.getElementById('login-pass').value = '';
            document.getElementById('header-title-text').innerText = "Chat Asistencia";
            document.getElementById('badge-creditos').classList.add('hidden'); 
            msgArea.innerHTML = '';
            document.getElementById('hero-welcome-container').style.display = 'none';
            cambiarVista('login');
        }

        document.getElementById('login-pass').addEventListener('keypress', function (e) { if (e.key === 'Enter') validarAcceso(); });
        document.getElementById('reg-pass').addEventListener('keypress', function (e) { if (e.key === 'Enter') registrarUsuario(); });

        socket.on('resultado_validacion', (respuesta) => {
            if (respuesta.exito) {
                document.getElementById('header-title-text').innerText = "Hola, " + respuesta.usuario;
                document.getElementById('hero-welcome-container').style.display = 'block';
                document.getElementById('welcome-name').innerText = "¡Hola, " + respuesta.usuario + "!";
                
                if(respuesta.creditos !== undefined) {
                    document.getElementById('badge-creditos').classList.remove('hidden');
                    document.getElementById('txt-creditos').innerText = respuesta.creditos;
                }
                
                msgArea.innerHTML = '';
                if(respuesta.historial && respuesta.historial.length > 0) {
                    respuesta.historial.forEach(h => {
                        if (h.emisor === 'bot') {
                            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble bot">${h.mensaje}</div></div>`;
                        } else if (h.emisor === 'admin') {
                            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble admin"><b>Asesor:</b> ${h.mensaje}</div></div>`;
                        } else if (h.emisor === 'cliente') {
                            let check = h.leido ? '<span class="status-text visto">✓ Visto</span>' : '<span class="status-text">✓ Enviado</span>';
                            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${h.mensaje}</div>${check}</div>`;
                        }
                    });
                }
                
                cambiarVista('chat');
                irAlMenuPrincipal();
            }
        });

        // ==========================================
        // CONTROL DE MENÚS Y CHAT
        // ==========================================
        function volverYLimpiarChat() {
            if (msgArea) {
                msgArea.innerHTML = '<div style="text-align: center; color: #64748b; font-size: 12px; margin-top: 20px;">Conectando...</div>';
            }
            irAlMenuPrincipal();
        }

        function irAlMenuPrincipal() {
            document.getElementById('container-deposit-options').style.display = 'none';
            document.getElementById('container-chat-input').style.display = 'none';
            document.getElementById('container-games-options').style.display = 'none';
            msgArea.style.display = 'none';
            
            document.getElementById('hero-welcome-container').style.display = 'block';
            document.getElementById('container-menu-options').style.display = 'flex';
        }

        function mostrarSubMenuMinijuegos() {
            document.getElementById('container-menu-options').style.display = 'none';
            document.getElementById('hero-welcome-container').style.display = 'none';
            document.getElementById('container-games-options').style.display = 'flex';
        }

        function seleccionarOpcion(opcion) {
            document.getElementById('container-menu-options').style.display = 'none';
            document.getElementById('hero-welcome-container').style.display = 'none';
            msgArea.style.display = 'flex';

            if (opcion === 'Depósito') {
                document.getElementById('container-deposit-options').style.display = 'flex';
                let msgBot = `<b>CBU:</b> 0000151500038126204154<br><b>ALIAS:</b> 20719709.URBANATRADE<br><br>Enviá el comprobante 📄`;
                msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${opcion}</div><span class="status-text">✓ Enviado</span></div><div class="bubble-wrapper"><div class="bubble bot">${msgBot}</div></div>`;
                socket.emit('cliente_accion', { estado: 'Depósito', mensajeCliente: opcion, mensajeBot: msgBot });
            } else if (opcion === 'Soporte') {
                document.getElementById('container-chat-input').style.display = 'flex';
                let msgBot = `🛠️ <b>Soporte:</b> Escribí tu consulta, un asesor te responderá.`;
                msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${opcion}</div><span class="status-text">✓ Enviado</span></div><div class="bubble-wrapper"><div class="bubble bot">${msgBot}</div></div>`;
                socket.emit('cliente_accion', { estado: 'Soporte', mensajeCliente: opcion, mensajeBot: msgBot });
            } else {
                document.getElementById('container-chat-input').style.display = 'flex';
                let msgBot = `⏳ Derivando a un asesor... (Opción: ${opcion})`;
                msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${opcion}</div><span class="status-text">✓ Enviado</span></div><div class="bubble-wrapper"><div class="bubble bot">${msgBot}</div></div>`;
                socket.emit('cliente_accion', { estado: opcion, mensajeCliente: opcion, mensajeBot: msgBot });
            }
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function ejecutarAccionDeposito(accion) {
            let msg = accion === 'Subir Comprobante' ? "📁 Archivo recibido." : "✅ Pago reportado.";
            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${accion}</div><span class="status-text">✓ Enviado</span></div><div class="bubble-wrapper"><div class="bubble bot">${msg}</div></div>`;
            msgArea.scrollTop = msgArea.scrollHeight;
            socket.emit('cliente_accion', { estado: accion, mensajeCliente: accion, mensajeBot: msg });
        }

        function enviarMensajeLibreCliente() {
            const input = document.getElementById('client-raw-input'); const texto = input.value.trim(); if (texto === '') return;
            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${texto}</div><span class="status-text">✓ Enviado</span></div>`;
            msgArea.scrollTop = msgArea.scrollHeight;
            socket.emit('cliente_envia_mensaje_libre', { mensaje: texto }); input.value = '';
        }

        document.getElementById('client-raw-input').addEventListener('keypress', function (e) { if (e.key === 'Enter') enviarMensajeLibreCliente(); });

        socket.on('recibir_mensaje_admin', (datos) => {
            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble admin"><b>Asesor:</b> ${datos.mensaje}</div></div>`;
            document.querySelectorAll('.status-text').forEach(m => { m.innerText = '✓ Visto'; m.classList.add('visto'); });
            msgArea.scrollTop = msgArea.scrollHeight;
        });

        socket.on('tus_mensajes_fueron_leidos', () => {
            document.querySelectorAll('.status-text').forEach(m => { m.innerText = '✓ Visto'; m.classList.add('visto'); });
        });

        // ==========================================
        // SISTEMA DE MINIJUEGOS Y MODALES
        // ==========================================
        function abrirModal(juego) {
            if (juego === 'cargar-creditos') {
                document.getElementById('modal-cargar-creditos').style.display = 'block';
                return;
            }

            fetch(`/api/${juego === 'traga' ? 'tragamonedas' : juego}-config`)
            .then(res => res.json())
            .then(data => {
                if(!data.exito || !data.config || data.config.length === 0) {
                    alert("⚠️ Juego en mantenimiento. El servidor no devolvió premios configurados.");
                    return; 
                }
                
                if(juego === 'ruleta') {
                    ruletaConfig = data.config; currentRotation = 0;
                    const c = document.getElementById('ruleta-canvas'); const ctx = c.getContext('2d');
                    ctx.clearRect(0,0,c.width,c.height); const sl = (2*Math.PI)/ruletaConfig.length; const cols = ['#ff007f','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444'];
                    for(let i=0; i<ruletaConfig.length; i++) {
                        ctx.beginPath(); ctx.fillStyle = cols[i%cols.length]; ctx.moveTo(140,140); ctx.arc(140,140,138,i*sl,(i+1)*sl); ctx.fill(); ctx.stroke();
                        ctx.save(); ctx.translate(140,140); ctx.rotate(i*sl+sl/2); ctx.textAlign="right"; ctx.fillStyle="white"; ctx.font="bold 13px sans-serif"; ctx.fillText(ruletaConfig[i].premio.substring(0,15), 125, 5); ctx.restore();
                    }
                    c.style.transition='none'; c.style.transform='rotate(0deg)'; void c.offsetWidth; c.style.transition='transform 5s cubic-bezier(0.25,0.1,0.15,1)';
                    document.getElementById('btn-spin-ruleta').disabled = false;
                }
                else if (juego === 'raspa') {
                    raspaConfig = data.config; raspaYaJugada = false;
                    document.getElementById('client-tablero-raspa').innerHTML = Array(6).fill('<div class="raspa-block-card" onclick="jugarRaspa(arguments[0])"><div class="raspa-cover-layer">?</div></div>').map((s,i) => s.replace('arguments[0]', i)).join('');
                }
                else if (juego === 'traga') { tragaJugado = false; document.getElementById('btn-spin-traga').disabled = false; ['1','2','3'].forEach(i => document.getElementById(`client-slot-${i}`).innerText='🎰'); }
                else if (juego === 'cartas') { cartasJugado = false; document.getElementById('client-card').classList.remove('flipped'); }
                else if (juego === 'moneda') { monedaJugado = false; document.getElementById('client-coin').style.transform='rotateY(0deg)'; document.getElementById('client-coin').innerText='🪙'; }

                document.querySelectorAll('.btn-close-modal').forEach(b => b.classList.add('hidden'));
                document.getElementById(`modal-${juego}`).style.display = 'block';
            })
            .catch(err => {
                alert("❌ Error: No se pudo conectar con el servidor para abrir el minijuego.");
            });
        }

        function cerrarModal(juego) {
            document.getElementById(`modal-${juego}`).style.display = 'none';
            if(juego !== 'cargar-creditos' && juego !== 'tienda') {
                irAlMenuPrincipal();
            }
        }

        function anunciarVictoria(emoji, titulo, msg) {
            msgArea.style.display = 'flex';
            document.getElementById('container-games-options').style.display = 'none';
            document.getElementById('container-chat-input').style.display = 'flex';
            
            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${emoji} Jugué: ${titulo}</div><span class="status-text">✓ Enviado</span></div>`;
            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble bot">${msg}</div></div>`;
            msgArea.scrollTop = msgArea.scrollHeight;
            socket.emit('cliente_accion', { estado: 'Menú' }); 
        }

        function abrirSlotPremium() {
            window.open('https://api.whatsapp.com/send?phone=TUNUMERO', '_blank');
        }

        async function solicitarCargaCreditos() {
            const monto = document.getElementById('input-creditos-monto').value;
            const url = document.getElementById('input-creditos-url').value;
            
            if(!monto || !url) return alert("Ingresá el monto y la URL del comprobante.");

            try {
                const res = await fetch('/api/solicitar-carga-creditos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: window.usuarioLogueado, amount: Number(monto), receiptUrl: url }) });
                const data = await res.json();
                
                if(data.success) {
                    cerrarModal('cargar-creditos');
                    document.getElementById('input-creditos-monto').value = ''; document.getElementById('input-creditos-url').value = '';
                    
                    msgArea.style.display = 'flex';
                    document.getElementById('container-menu-options').style.display = 'none';
                    document.getElementById('container-chat-input').style.display = 'flex';

                    msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">🟡 Reporté pago de ${monto} Créditos.<br>Comprobante adjuntado.</div><span class="status-text">✓ Enviado</span></div>`;
                    msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble bot">✅ ${data.message}</div></div>`;
                    msgArea.scrollTop = msgArea.scrollHeight;
                    socket.emit('cliente_accion', { estado: 'Carga Créditos', mensajeCliente: `Reporté pago de ${monto} Créditos`, mensajeBot: data.message });
                } else alert(data.message || "Error al procesar la solicitud.");
            } catch(e) { alert("Error de conexión al solicitar los créditos."); }
        }

        function jugarRuleta() {
            document.getElementById('btn-spin-ruleta').disabled = true;
            fetch('/api/tirar-ruleta', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: window.usuarioLogueado }) })
            .then(r => r.json()).then(data => {
                if(!data.exito) { alert(data.mensaje); return cerrarModal('ruleta'); }
                const wIdx = ruletaConfig.findIndex(i => i.id === data.premio.id); const sl = 360/ruletaConfig.length;
                let needed = (270 - ((wIdx*sl)+(sl/2))) - (currentRotation%360); if(needed<0) needed+=360;
                currentRotation += needed + (360*5);
                document.getElementById('ruleta-canvas').style.transform = `rotate(${currentRotation}deg)`;
                setTimeout(() => { document.querySelector('#modal-ruleta .btn-close-modal').classList.remove('hidden'); anunciarVictoria('🎯', 'Ruleta', data.mensaje); }, 5300);
            });
        }

        function jugarRaspa(idx) {
            if(raspaYaJugada) return; raspaYaJugada = true;
            const cards = document.querySelectorAll('#client-tablero-raspa .raspa-block-card'); cards[idx].querySelector('.raspa-cover-layer').innerText = "⏳";
            fetch('/api/tirar-raspa', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: window.usuarioLogueado }) })
            .then(r => r.json()).then(data => {
                if(!data.exito) { alert(data.mensaje); return cerrarModal('raspa'); }
                const pools = raspaConfig.filter(i => i.id !== data.premio.id).sort(() => Math.random() - 0.5);
                cards[idx].classList.add('scratched'); cards[idx].querySelector('.raspa-cover-layer').style.opacity = '0';
                cards[idx].innerHTML += `<div class="raspa-prize-text">${data.premio.premio}</div><div class="raspa-value-text">$${data.premio.valor}</div>`;
                setTimeout(() => {
                    let rIdx = 0; cards.forEach((c, i) => { if(i!==idx) { c.classList.add('others-revealed'); c.querySelector('.raspa-cover-layer').style.opacity='0'; c.innerHTML += `<div class="raspa-prize-text">${pools[rIdx].premio}</div><div class="raspa-value-text">$${pools[rIdx].valor}</div>`; rIdx++; }});
                    document.querySelector('#modal-raspa .btn-close-modal').classList.remove('hidden'); anunciarVictoria('🎫', 'Raspa y Gana', data.mensaje);
                }, 800);
            });
        }

        function jugarTragamonedas() {
            if(tragaJugado) return;
            document.getElementById('btn-spin-traga').disabled = true;
            fetch('/api/tirar-tragamonedas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: window.usuarioLogueado }) })
            .then(r => r.json()).then(data => {
                if(!data.exito) { alert(data.mensaje); return cerrarModal('traga'); }
                tragaJugado = true;
                document.getElementById('client-slot-1').innerText="⏳"; document.getElementById('client-slot-2').innerText="⏳"; document.getElementById('client-slot-3').innerText="⏳";
                setTimeout(() => {
                    let icons = ['🍒','💎','🔔','🍋','❌'];
                    document.getElementById('client-slot-1').innerText = icons[Math.floor(Math.random()*icons.length)];
                    document.getElementById('client-slot-2').innerText = icons[Math.floor(Math.random()*icons.length)];
                    document.getElementById('client-slot-3').innerText = data.premio.premio.substring(0,2) || "🎰";
                    document.querySelector('#modal-traga .btn-close-modal').classList.remove('hidden');
                    anunciarVictoria('🍒', 'Slots', data.mensaje);
                }, 1500);
            });
        }

        function jugarCartas() {
            if(cartasJugado) return;
            fetch('/api/tirar-cartas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: window.usuarioLogueado }) })
            .then(r => r.json()).then(data => {
                if(!data.exito) { alert(data.mensaje); return cerrarModal('cartas'); }
                cartasJugado = true;
                document.getElementById('client-card').classList.add('flipped');
                document.getElementById('client-card-val').innerText = data.premio.premio.substring(0,2) || "🃏";
                document.getElementById('client-card-desc').innerText = data.premio.premio;
                document.querySelector('#modal-cartas .btn-close-modal').classList.remove('hidden');
                anunciarVictoria('🃏', 'Carta de la Suerte', data.mensaje);
            });
        }

        function jugarMoneda() {
            if(monedaJugado) return;
            fetch('/api/tirar-moneda', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: window.usuarioLogueado }) })
            .then(r => r.json()).then(data => {
                if(!data.exito) { alert(data.mensaje); return cerrarModal('moneda'); }
                monedaJugado = true;
                const c = document.getElementById('client-coin');
                c.style.transform = `rotateY(${180 * 5}deg)`;
                setTimeout(() => {
                    c.innerText = data.premio.premio.includes('Cara') ? '🟡' : (data.premio.premio.includes('Cruz') ? '⚪' : '💥');
                    document.querySelector('#modal-moneda .btn-close-modal').classList.remove('hidden');
                    anunciarVictoria('🪙', 'Cara o Cruz', data.mensaje);
                }, 1500);
            });
        }
        
        async function abrirTienda() {
            try {
                const res = await fetch('/api/tienda');
                const productos = await res.json();
                
                const grid = document.querySelector('.tienda-grid');
                grid.innerHTML = ''; 
                
                productos.forEach(prod => {
                    grid.innerHTML += `
                        <div class="producto-card">
                            <p>${prod.nombre}</p>
                            <span class="producto-precio">${prod.costo} CR</span>
                            <button class="btn-primary" onclick="canjearProducto('${prod.nombre}', ${prod.costo})">Canjear</button>
                        </div>
                    `;
                });
                document.getElementById('modal-tienda').style.display = 'block';
            } catch(e) { alert("Error cargando la tienda"); }
        }
    </script>
