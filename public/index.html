<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Fénix - Acceso</title>
    <link rel="stylesheet" href="index.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="header-title">
                <div class="status-dot"></div>
                <span id="header-title-text">Casino Fénix</span>
                <span id="badge-creditos" class="badge-creditos hidden">🟡 <span id="txt-creditos">0</span> CR</span>
            </div>
            <button id="btn-cerrar-sesion" class="btn-logout hidden" onclick="cerrarSesion()">Salir</button>
        </div>

        <div id="vista-login" class="auth-body">
            <h3>Acceso de Clientes</h3>
            <input type="text" id="login-user" class="input-dark" placeholder="Usuario...">
            <input type="password" id="login-pass" class="input-dark" placeholder="Contraseña...">
            <button class="btn-primary" id="btn-login" onclick="validarAccesoManual()">Ingresar al Chat</button>
        </div>

        <div id="vista-chat" class="hidden">
            <div id="hero-welcome-container" class="hero-welcome hidden">
                <h2 id="welcome-name">¡Hola, Nahue!</h2>
                <p>Bienvenido nuevamente a Fénix 🦅</p>
            </div>
            
            <div class="chat-messages" id="messages-area"></div>
            
            <div id="container-menu-options" class="menu-grid" style="display: none;">
                <button class="btn-action" onclick="seleccionarOpcion('Depósito')">💰 Cargar</button>
                <button class="btn-action" onclick="seleccionarOpcion('Retiro')">💸 Retirar</button>
                <button class="btn-action" onclick="seleccionarOpcion('Soporte')">🛠️ Soporte</button>
                <button class="btn-action" onclick="seleccionarOpcion('Referido')">🎁 Referí</button>
                <button class="btn-action" style="grid-column: span 2;" onclick="abrirModal('cargar-creditos')">🟡 Cargar Créditos</button>
                <button class="btn-action" style="grid-column: span 2; background: #7c3aed;" onclick="abrirTienda()">🛒 TIENDA</button>
                <button class="btn-action" style="grid-column: span 2; background: linear-gradient(90deg, #6366f1, #a855f7);" onclick="mostrarSubMenuMinijuegos()">🎮 Minijuegos</button>
            </div>

            <div id="container-games-options" class="menu-grid" style="display: none; grid-template-columns: 1fr 1fr 1fr;">
                <button class="btn-action" onclick="abrirModal('ruleta')">🎯</button>
                <button class="btn-action" onclick="abrirModal('raspa')">🎫</button>
                <button class="btn-action" onclick="abrirModal('traga')">🍒</button>
                <button class="btn-action" style="grid-column: span 3;" onclick="abrirSlotPremium()">💎 JUGAR SLOT PREMIUM 💎</button>
                <button class="btn-action" style="grid-column: span 3; background:#374151;" onclick="irAlMenuPrincipal()">↩️ Volver</button>
            </div>

            <div id="container-chat-input" class="chat-input-area hidden">
                <input type="text" id="client-raw-input" class="input-dark" style="margin:0;" placeholder="Escribí acá...">
                <button class="btn-primary" style="width:auto; padding: 0 15px;" onclick="enviarMensajeLibreCliente()">Enviar</button>
                <button class="btn-action" style="padding: 0 10px; margin-top:0;" onclick="irAlMenuPrincipal()">↩️</button>
            </div>
        </div>
    </div>

    <div id="modal-cargar-creditos" class="modal-overlay hidden"></div>
    <div id="modal-tienda" class="modal-overlay hidden"></div>
    <div id="modal-ruleta" class="modal-overlay hidden"></div>
    <div id="modal-raspa" class="modal-overlay hidden"></div>
    <div id="modal-traga" class="modal-overlay hidden"></div>
    <div id="modal-cartas" class="modal-overlay hidden"></div>
    <div id="modal-moneda" class="modal-overlay hidden"></div>
    <div id="modal-victoria" class="modal-victoria hidden"></div>

    <script src="index.js"></script>
</body>
</html>
