<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Fénix - Acceso</title>
    <link rel="stylesheet" href="index.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="header-title">
                <div class="status-dot"></div>
                <span id="header-title-text">Casino Fénix</span>
                <span id="badge-creditos" class="badge-creditos hidden">🟡 <span id="txt-creditos">0</span> CR</span>
            </div>
            <button id="btn-cerrar-sesion" class="btn-logout hidden" onclick="cerrarSesion()">Salir</button>
        </div>

        <div id="vista-login" class="auth-body">
            <h3>Acceso de Clientes</h3>
            <input type="text" id="login-user" class="input-dark" placeholder="Usuario...">
            <input type="password" id="login-pass" class="input-dark" placeholder="Contraseña...">
            <button class="btn-primary" onclick="validarAccesoManual()">Ingresar</button>
        </div>

        <div id="vista-chat" class="hidden">
            <div class="chat-messages" id="messages-area"></div>
            
            <div id="container-menu-options" class="menu-grid">
                <button class="btn-action" onclick="seleccionarOpcion('Depósito')">💰 Cargar</button>
                <button class="btn-action" onclick="seleccionarOpcion('Retiro')">💸 Retirar</button>
                <button class="btn-action" onclick="seleccionarOpcion('Soporte')">🛠️ Soporte</button>
                <button class="btn-action" onclick="seleccionarOpcion('Referido')">🎁 Referí</button>
                <button class="btn-action" style="grid-column: span 2;" onclick="abrirModal('cargar-creditos')">🟡 Cargar Créditos</button>
                <button class="btn-action" style="grid-column: span 2;" onclick="abrirTienda()">🛒 Tienda</button>
            </div>

            <div id="container-chat-input" class="chat-input-area hidden">
                <input type="text" id="client-raw-input" class="input-dark" placeholder="Escribí...">
                <button class="btn-primary" style="width:auto;" onclick="enviarMensajeLibreCliente()">Enviar</button>
            </div>
        </div>
    </div>

    <div id="modal-cargar-creditos" class="modal hidden"></div>
    <div id="modal-tienda" class="modal hidden"></div>

    <script src="index.js"></script>
</body>
</html>
