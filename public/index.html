<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Casino Fénix</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0f19; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        
        .chat-window { width: 360px; height: 540px; background-color: #111827; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #1f2937; }
        .chat-header { background-color: #1f2937; padding: 15px; color: #ffffff; font-weight: bold; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #374151; }
        .header-title-wrapper { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        
        .chat-body { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; color: #cbd5e1; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active { display: flex; }

        .bubble-wrapper { display: flex; flex-direction: column; margin-bottom: 14px; width: 100%; position: relative; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 13.5px; line-height: 1.4; word-wrap: break-word; box-sizing: border-box; }
        .bubble.bot { background-color: #1f2937; color: #cbd5e1; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #374151; }
        .bubble.admin { background-color: #1e3a8a; color: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #2563eb; }
        .bubble.cliente { background-color: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .status-text { font-size: 10px; color: #64748b; align-self: flex-end; margin-right: 5px; margin-top: 4px; font-weight: bold; display: block; }
        .status-text.visto { color: #38bdf8; }

        .login-input { width: 100%; padding: 12px; background-color: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; text-align: center; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .login-input:focus { border-color: #38bdf8; }
        .btn-general { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-general:hover { background-color: #1d4ed8; }
        
        /* ESTILOS NUEVOS PARA REGISTRO Y LOGOUT */
        .btn-text { background: none; border: none; color: #94a3b8; font-size: 13px; cursor: pointer; margin-top: 15px; text-decoration: underline; width: 100%; text-align: center; }
        .btn-text:hover { color: white; }
        .btn-logout { background-color: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-logout:hover { background-color: #ef4444; color: white; }
        .btn-success { background-color: #10b981; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-success:hover { background-color: #059669; }

        .deposit-grid { display: grid; grid-template-columns: 1fr 1fr 0.8fr; gap: 8px; width: 100%; margin-top: auto; padding-top: 10px; }
        .btn-action { background-color: #1f2937; border: 1px solid #374151; color: white; padding: 12px 5px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-action:hover { background-color: #2563eb; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }

        .chat-input-area { display: none; gap: 8px; border-top: 1px solid #1f2937; padding-top: 10px; margin-top: auto; width: 100%; box-sizing: border-box; }
        .client-text-input { flex: 1; background-color: #1f2937; border: 1px solid #374151; border-radius: 8px; padding: 10px; color: white; font-size: 13px; outline: none; }
        .btn-send-client { background-color: #2563eb; border: none; color: white; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        
        /* ESTILOS INTERFAZ VISUAL DE LA RULETA */
        .modal-ruleta-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; }
        .modal-ruleta-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 330px; background: #111827; padding: 25px; border-radius: 16px; border: 1px solid #ffaa00; box-shadow: 0 0 30px rgba(255, 170, 0, 0.4); text-align: center; box-sizing: border-box; }
        .ruleta-container { position: relative; width: 280px; height: 280px; margin: 0 auto; }
        .ruleta-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 40px; color: #ffaa00; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        #ruleta-canvas { transition: transform 5s cubic-bezier(0.25, 0.1, 0.15, 1); width: 100%; height: 100%; border-radius: 50%; border: 3px solid #1f2937; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .btn-spin { background: linear-gradient(90deg, #ff007f, #ffaa00); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 25px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255,170,0,0.3); }
        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ESTILOS INTERFAZ VISUAL DEL RASPA Y GANA */
        .modal-raspa-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; }
        .modal-raspa-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 335px; background: #111827; padding: 25px; border-radius: 16px; border: 1px solid #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); text-align: center; box-sizing: border-box; }
        .raspa-grid-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin: 20px 0; }
        .raspa-block-card { width: 92px; height: 80px; background-color: #1f2937; border: 2px dashed #10b981; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s; box-sizing: border-box; }
        .raspa-block-card.scratched { background-color: #0b0f19; border-style: solid; border-color: #2563eb; }
        .raspa-block-card.others-revealed { background-color: #111827; border-style: solid; border-color: #374151; opacity: 0.65; }
        .raspa-cover-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #374151, #1f2937); display: flex; justify-content: center; align-items: center; color: #94a3b8; font-weight: bold; font-size: 22px; transition: opacity 0.4s; z-index: 2; }
        .raspa-prize-text { font-size: 10px; font-weight: bold; color: white; text-align: center; padding: 2px; line-height: 1.2; }
        .raspa-value-text { font-size: 11px; font-weight: bold; color: #38bdf8; margin-top: 3px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="chat-window">
        <div class="chat-header">
            <div class="header-title-wrapper">
                <div class="status-dot"></div>
                <span id="header-title">Chat Asistencia (En línea)</span>
            </div>
            <button id="btn-cerrar-sesion" class="btn-logout hidden" onclick="cerrarSesion()">Salir</button>
        </div>
        
        <div class="chat-body" id="chat-flow-container">
            
            <div id="screen-login" class="screen active" style="justify-content: center; align-items: center; height: 100%;">
                <h2 style="color:white; margin-bottom: 25px; font-size: 18px; text-align: center;">Acceso de Clientes</h2>
                <input type="text" id="username" class="login-input" placeholder="Tu usuario de casino...">
                <input type="password" id="password" class="login-input" placeholder="Tu contraseña...">
                <button id="btn-login" class="btn-general" onclick="validarAcceso()">Ingresar al Chat</button>
                <button class="btn-text" onclick="mostrarPantalla('screen-registro')">¿No tenés cuenta? Crear usuario</button>
            </div>

            <div id="screen-registro" class="screen" style="justify-content: center; align-items: center; height: 100%;">
                <h2 style="color:white; margin-bottom: 25px; font-size: 18px; text-align: center;">Crear Nuevo Usuario</h2>
                <input type="text" id="reg-user" class="login-input" placeholder="Elegí tu nombre...">
                <input type="password" id="reg-pass" class="login-input" placeholder="Elegí una contraseña...">
                <button id="btn-registro" class="btn-success" onclick="registrarUsuario()">Crear Cuenta y Entrar</button>
                <button class="btn-text" onclick="mostrarPantalla('screen-login')">Ya tengo cuenta. Ingresar.</button>
            </div>

            <div id="screen-conversation" class="screen" style="height: 100%;">
                <div id="messages-area" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 10px;"></div>
                
                <div id="container-menu-options" class="menu-grid" style="display: none;">
                    <button class="btn-action" style="padding: 20px 10px; font-size:14px;" onclick="seleccionarOpcion('Depósito')">💰 Cargar</button>
                    <button class="btn-action" style="padding: 20px 10px; font-size:14px;" onclick="seleccionarOpcion('Retiro')">💸 Retirar</button>
                    <button class="btn-action" style="padding: 20px 10px; font-size:14px;" onclick="seleccionarOpcion('Soporte')">🛠️ Soporte</button>
                    <button class="btn-action" style="padding: 20px 10px; font-size:14px;" onclick="seleccionarOpcion('Referido')">🎁 Referí y GANÁ</button>
                    
                    <button class="btn-action" style="padding: 20px 10px; font-size:15px; grid-column: span 2; background: linear-gradient(90deg, #6366f1, #a855f7); border:none; box-shadow: 0 0 15px rgba(168,85,247,0.3); color: white;" onclick="mostrarSubMenuMinijuegos()">🎮 Minijuegos Diarios</button>
                </div>

                <div id="container-games-options" class="menu-grid" style="display: none;">
                    <button class="btn-action" style="padding: 20px 10px; font-size:14px; background: linear-gradient(135deg, #ff007f, #ffaa00); border:none; color:white; font-weight: bold;" onclick="abrirModalRuleta()">🎯 Ruleta de Premios</button>
                    <button class="btn-action" style="padding: 20px 10px; font-size:14px; background: linear-gradient(135deg, #10b981, #3b82f6); border:none; color:white; font-weight: bold;" onclick="abrirModalRaspa()">🎫 Raspa y Gana</button>
                    <button class="btn-action" style="background-color: #374151; padding: 12px 10px; font-size:14px; grid-column: span 2;" onclick="irAlMenuPrincipal()">↩️ Volver al Menú Principal</button>
                </div>

                <div id="container-deposit-options" class="deposit-grid" style="display: none;">
                    <button class="btn-action" onclick="ejecutarAccionDeposito('Subir Comprobante')">📁 Subir Comprobante</button>
                    <button class="btn-action" onclick="ejecutarAccionDeposito('Reportar Pago')">📄 Reportar Pago</button>
                    <button class="btn-action" style="background-color: #374151;" onclick="irAlMenuPrincipal()">↩️ Volver</button>
                </div>

                <div id="container-chat-input" class="chat-input-area">
                    <input type="text" id="client-raw-input" class="client-text-input" placeholder="Escribí tu mensaje acá...">
                    <button class="btn-send-client" onclick="enviarMensajeLibreCliente()">Enviar</button>
                    <button class="btn-action" style="background-color: #374151; padding: 0 10px; border-radius: 8px;" onclick="irAlMenuPrincipal()">↩️</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-ruleta" class="modal-ruleta-overlay">
        <div class="modal-ruleta-content">
            <h3 style="color:white; margin-top:0; font-size: 22px;">🎰 ¡Tu Tiro Diario!</h3>
            <div class="ruleta-container">
                <div class="ruleta-pointer">▼</div>
                <canvas id="ruleta-canvas" width="280" height="280"></canvas>
            </div>
            <button id="btn-spin" class="btn-spin" onclick="iniciarGiro()">GIRAR AHORA</button>
            <button id="btn-close-ruleta" class="btn-action" style="margin-top:10px; width:100%; display:none; background-color:#374151;" onclick="cerrarRuletaModal()">Volver</button>
        </div>
    </div>

    <div id="modal-raspa" class="modal-raspa-overlay">
        <div class="modal-raspa-content">
            <h3 style="color:white; margin-top:0; font-size: 22px;">🎫 Raspa y Gana</h3>
            <p style="color: #64748b; font-size:12px; margin:5px 0 15px 0;">Elegí 1 casillero para raspar y descubrir tu premio diario.</p>
            
            <div class="raspa-grid-board" id="client-tablero-raspa">
                <div class="raspa-block-card" onclick="rasparCasilleroCliente(0)"><div class="raspa-cover-layer">?</div></div>
                <div class="raspa-block-card" onclick="rasparCasilleroCliente(1)"><div class="raspa-cover-layer">?</div></div>
                <div class="raspa-block-card" onclick="rasparCasilleroCliente(2)"><div class="raspa-cover-layer">?</div></div>
                <div class="raspa-block-card" onclick="rasparCasilleroCliente(3)"><div class="raspa-cover-layer">?</div></div>
                <div class="raspa-block-card" onclick="rasparCasilleroCliente(4)"><div class="raspa-cover-layer">?</div></div>
                <div class="raspa-block-card" onclick="rasparCasilleroCliente(5)"><div class="raspa-cover-layer">?</div></div>
            </div>
            <button id="btn-close-raspa" class="btn-action" style="margin-top:15px; width:100%; display:none; background-color:#374151; padding: 10px;" onclick="cerrarRaspaModal()">Volver al Menú</button>
        </div>
    </div>

    <script>
        const socket = io();
        const msgArea = document.getElementById('messages-area');
        window.usuarioLogueado = null; 

        // VARIABLES DE LOS MINIJUEGOS
        let ruletaConfig = [];
        let currentRotation = 0;
        let raspaConfig = [];
        let raspaYaJugada = false;

        // CONTROL DE PANTALLAS
        function mostrarPantalla(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ==========================================
        // REGISTRO Y LOGIN
        // ==========================================
        async function registrarUsuario() {
            const u = document.getElementById('reg-user').value.trim();
            const p = document.getElementById('reg-pass').value.trim();
            
            if(!u || !p) return alert("Por favor, completá ambos campos.");

            const btn = document.getElementById('btn-registro');
            btn.innerText = 'Creando...'; btn.disabled = true;

            try {
                const res = await fetch('/api/registrar-cliente', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: u, password: p })
                });
                
                const data = await res.json();
                btn.innerText = 'Crear Cuenta y Entrar'; btn.disabled = false;

                if (data.exito) {
                    alert("¡Cuenta creada con éxito! Ingresando al chat...");
                    document.getElementById('username').value = u;
                    document.getElementById('password').value = p;
                    validarAcceso(); // Ingresa automáticamente
                } else {
                    alert(data.mensaje);
                }
            } catch (e) {
                btn.innerText = 'Crear Cuenta y Entrar'; btn.disabled = false;
                alert("Error de conexión al registrarse.");
            }
        }

        function validarAcceso() {
            const usuarioInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            
            if (usuarioInput === '' || passwordInput === '') return alert('Por favor, ingresá tu usuario y contraseña.');

            const btn = document.getElementById('btn-login');
            btn.innerText = 'Validando...'; btn.disabled = true;

            fetch('/api/validar-cliente', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: usuarioInput, password: passwordInput })
            })
            .then(res => res.json())
            .then(data => {
                btn.innerText = 'Ingresar al Chat'; btn.disabled = false;
                if(data.exito) {
                    window.usuarioLogueado = usuarioInput; 
                    socket.emit('identificar_usuario', { usuario: usuarioInput });
                    document.getElementById('btn-cerrar-sesion').classList.remove('hidden');
                } else {
                    alert('Usuario o contraseña incorrectos. Consultá con soporte.');
                }
            })
            .catch(err => {
                btn.innerText = 'Ingresar al Chat'; btn.disabled = false;
                alert('Hubo un error al conectar con el servidor.');
            });
        }

        function cerrarSesion() {
            socket.disconnect(); 
            socket.connect(); 
            window.usuarioLogueado = null;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('header-title').innerText = "Chat Asistencia (En línea)";
            document.getElementById('btn-cerrar-sesion').classList.add('hidden');
            msgArea.innerHTML = '';
            mostrarPantalla('screen-login');
        }

        document.getElementById('password').addEventListener('keypress', function (e) { if (e.key === 'Enter') validarAcceso(); });
        document.getElementById('reg-pass').addEventListener('keypress', function (e) { if (e.key === 'Enter') registrarUsuario(); });

        socket.on('resultado_validacion', (respuesta) => {
            if (respuesta.exito) {
                document.getElementById('header-title').innerText = "Hola, " + respuesta.usuario;
                mostrarPantalla('screen-conversation');
                irAlMenuPrincipal();
            }
        });

        // ==========================================
        // LÓGICA DEL MENÚ Y CHAT
        // ==========================================
        function irAlMenuPrincipal() {
            document.getElementById('container-deposit-options').style.display = 'none';
            document.getElementById('container-chat-input').style.display = 'none';
            document.getElementById('container-games-options').style.display = 'none';
            document.getElementById('container-menu-options').style.display = 'grid';
            
            let msgBot = 'Volviste al menú principal. ¿En qué te podemos ayudar?';
            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble bot"><b>Club Zeus:</b><br>${msgBot}</div></div>`;
            msgArea.scrollTop = msgArea.scrollHeight;
            socket.emit('cliente_accion', { estado: 'Menú', mensajeBot: msgBot });
        }

        function mostrarSubMenuMinijuegos() {
            document.getElementById('container-menu-options').style.display = 'none';
            document.getElementById('container-deposit-options').style.display = 'none';
            document.getElementById('container-chat-input').style.display = 'none';
            document.getElementById('container-games-options').style.display = 'grid';
        }

        function seleccionarOpcion(opcion) {
            document.getElementById('container-menu-options').style.display = 'none';

            if (opcion === 'Depósito') {
                document.getElementById('container-deposit-options').style.display = 'grid';
                let msgBot = `<b>CBU:</b> 0000151500038126204154<br><b>ALIAS:</b> 20719709.URBANATRADE<br><b>Titular:</b> BAIRES LOGISTICAS AUDIOVISUALES S.A.<br><br>Realizá la transferencia y enviá el comprobante 📄`;
                msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${opcion}</div><span class="status-text">✓ Enviado</span></div><div class="bubble-wrapper"><div class="bubble bot">${msgBot}</div></div>`;
                socket.emit('cliente_accion', { estado: 'Depósito', mensajeCliente: opcion, mensajeBot: msgBot });
            } else if (opcion === 'Soporte') {
                document.getElementById('container-chat-input').style.display = 'flex';
                let msgBot = `🛠️ <b>Conectado con Soporte:</b> Podés escribir tu consulta acá abajo. Un asesor te va a responder de inmediato.`;
                msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${opcion}</div><span class="status-text">✓ Enviado</span></div><div class="bubble-wrapper"><div class="bubble bot">${msgBot}</div></div>`;
                socket.emit('cliente_accion', { estado: 'Soporte', mensajeCliente: opcion, mensajeBot: msgBot });
            } else {
                let msgBot = `⏳ Derivando a un asesor... Elegiste la opción de <b>${opcion}</b>. Aguardá un instante en línea por favor.`;
                msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${opcion}</div><span class="status-text">✓ Enviado</span></div><div class="bubble-wrapper"><div class="bubble bot">${msgBot}</div></div>`;
                socket.emit('cliente_accion', { estado: opcion, mensajeCliente: opcion, mensajeBot: msgBot });
                setTimeout(irAlMenuPrincipal, 4000); 
            }
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function ejecutarAccionDeposito(accion) {
            let confirmacionBot = "";
            if(accion === 'Subir Comprobante') confirmacionBot = "📁 Archivo recibido con éxito. Aguarde a que un cajero verifique su saldo.";
            if(accion === 'Reportar Pago') confirmacionBot = "✅ Pago reportado. El administrador revisará la transferencia a la brevedad.";

            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${accion}</div><span class="status-text">✓ Enviado</span></div><div class="bubble-wrapper"><div class="bubble bot">${confirmacionBot}</div></div>`;
            msgArea.scrollTop = msgArea.scrollHeight;
            socket.emit('cliente_accion', { estado: accion, mensajeCliente: accion, mensajeBot: confirmacionBot });
        }

        function enviarMensajeLibreCliente() {
            const input = document.getElementById('client-raw-input');
            const texto = input.value.trim();
            if (texto === '') return;
            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">${texto}</div><span class="status-text">✓ Enviado</span></div>`;
            msgArea.scrollTop = msgArea.scrollHeight;
            socket.emit('cliente_envia_mensaje_libre', { mensaje: texto });
            input.value = '';
        }

        document.getElementById('client-raw-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') enviarMensajeLibreCliente();
        });

        socket.on('recibir_mensaje_admin', (datos) => {
            msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble admin"><b>Asesor:</b> ${datos.mensaje}</div></div>`;
            marcarMensajesLocalesComoVistos();
            msgArea.scrollTop = msgArea.scrollHeight;
        });

        socket.on('tus_mensajes_fueron_leidos', () => {
            marcarMensajesLocalesComoVistos();
        });

        function marcarMensajesLocalesComoVistos() {
            const marcas = document.querySelectorAll('.status-text');
            marcas.forEach(m => {
                m.innerText = '✓ Visto';
                m.classList.add('visto');
            });
        }

        // ==========================================
        // LÓGICA DE LA RULETA VISUAL
        // ==========================================
        async function abrirModalRuleta() {
            const res = await fetch('/api/ruleta-config');
            const data = await res.json();
            if(!data.exito || data.config.length === 0) {
                alert("La ruleta no está configurada por el administrador."); return;
            }
            ruletaConfig = data.config;
            dibujarRuleta(ruletaConfig);
            
            document.getElementById('ruleta-canvas').style.transition = 'none';
            document.getElementById('ruleta-canvas').style.transform = `rotate(${currentRotation}deg)`;
            void document.getElementById('ruleta-canvas').offsetWidth; 
            
            document.getElementById('ruleta-canvas').style.transition = 'transform 5s cubic-bezier(0.25, 0.1, 0.15, 1)';
            document.getElementById('btn-spin').disabled = false;
            document.getElementById('btn-close-ruleta').style.display = 'none';
            document.getElementById('modal-ruleta').style.display = 'block';
        }

        function cerrarRuletaModal() {
            document.getElementById('modal-ruleta').style.display = 'none';
            irAlMenuPrincipal();
        }

        function dibujarRuleta(config) {
            const canvas = document.getElementById('ruleta-canvas');
            const ctx = canvas.getContext('2d');
            const center = canvas.width / 2;
            const radius = center - 2; 
            const sliceAngle = (2 * Math.PI) / config.length;
            const colors = ['#ff007f', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444'];

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<config.length; i++) {
                const angle = i * sliceAngle;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + sliceAngle);
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#0b0f19";
                ctx.stroke();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angle + sliceAngle / 2); 
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 13px 'Segoe UI', sans-serif";
                let text = config[i].premio;
                if(text.length > 15) text = text.substring(0, 15) + "..";
                ctx.fillText(text, radius - 15, 5); 
                ctx.restore();
            }
        }

        function iniciarGiro() {
            document.getElementById('btn-spin').disabled = true;

            fetch('/api/tirar-ruleta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: window.usuarioLogueado })
            })
            .then(res => res.json())
            .then(data => {
                if(!data.exito) {
                    alert(data.mensaje);
                    cerrarRuletaModal();
                    return;
                }

                const winnerIndex = ruletaConfig.findIndex(item => item.id === data.premio.id);
                const sliceDegree = 360 / ruletaConfig.length;
                const centerOfWinner = (winnerIndex * sliceDegree) + (sliceDegree / 2);
                const targetRotation = 270 - centerOfWinner;
                const currentMod = currentRotation % 360;
                let needed = targetRotation - currentMod;
                if (needed < 0) needed += 360; 

                currentRotation += needed + (360 * 5); 

                const canvas = document.getElementById('ruleta-canvas');
                canvas.style.transform = `rotate(${currentRotation}deg)`;

                setTimeout(() => {
                    document.getElementById('btn-close-ruleta').style.display = 'block';
                    
                    msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">🎯 Jugué a la Ruleta de Premios</div><span class="status-text">✓ Enviado</span></div>`;
                    msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble bot">${data.mensaje}</div></div>`;
                    msgArea.scrollTop = msgArea.scrollHeight;
                    socket.emit('cliente_accion', { estado: 'Menú' }); 
                }, 5300);
            })
            .catch(err => {
                alert("Error de conexión.");
                cerrarRuletaModal();
            });
        }

        // ==========================================
        // LÓGICA DEL RASPA Y GANA VISUAL
        // ==========================================
        function abrirModalRaspa() {
            fetch('/api/raspa-config')
            .then(res => res.json())
            .then(data => {
                if(!data.exito || data.config.length === 0) return alert("El Raspa y Gana no está configurado.");
                raspaConfig = data.config;
                raspaYaJugada = false;

                const tablero = document.getElementById('client-tablero-raspa');
                tablero.innerHTML = `
                    <div class="raspa-block-card" onclick="rasparCasilleroCliente(0)"><div class="raspa-cover-layer">?</div></div>
                    <div class="raspa-block-card" onclick="rasparCasilleroCliente(1)"><div class="raspa-cover-layer">?</div></div>
                    <div class="raspa-block-card" onclick="rasparCasilleroCliente(2)"><div class="raspa-cover-layer">?</div></div>
                    <div class="raspa-block-card" onclick="rasparCasilleroCliente(3)"><div class="raspa-cover-layer">?</div></div>
                    <div class="raspa-block-card" onclick="rasparCasilleroCliente(4)"><div class="raspa-cover-layer">?</div></div>
                    <div class="raspa-block-card" onclick="rasparCasilleroCliente(5)"><div class="raspa-cover-layer">?</div></div>
                `;
                document.getElementById('btn-close-raspa').style.display = 'none';
                document.getElementById('modal-raspa').style.display = 'block';
            });
        }

        function cerrarRaspaModal() {
            document.getElementById('modal-raspa').style.display = 'none';
            irAlMenuPrincipal();
        }

        function rasparCasilleroCliente(indexClickeado) {
            if(raspaYaJugada) return;
            raspaYaJugada = true;

            const casillerosDOM = document.querySelectorAll('.raspa-block-card');
            casillerosDOM[indexClickeado].querySelector('.raspa-cover-layer').innerText = "⏳";

            fetch('/api/tirar-raspa', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: window.usuarioLogueado })
            })
            .then(res => res.json())
            .then(data => {
                if(!data.exito) {
                    alert(data.mensaje);
                    cerrarRaspaModal();
                    return;
                }

                const ganador = data.premio;
                const poolPremiosRestantes = raspaConfig.filter(item => item.id !== ganador.id);
                poolPremiosRestantes.sort(() => Math.random() - 0.5);

                const cardGanadora = casillerosDOM[indexClickeado];
                cardGanadora.classList.add('scratched');
                cardGanadora.querySelector('.raspa-cover-layer').style.opacity = '0';
                cardGanadora.innerHTML += `<div class="raspa-prize-text">${ganador.premio}</div><div class="raspa-value-text">$${ganador.valor}</div>`;

                setTimeout(() => {
                    let rIndex = 0;
                    casillerosDOM.forEach((card, i) => {
                        if(i !== indexClickeado) {
                            card.classList.add('others-revealed');
                            card.querySelector('.raspa-cover-layer').style.opacity = '0';
                            const premioDeRelleno = poolPremiosRestantes[rIndex];
                            card.innerHTML += `<div class="raspa-prize-text">${premioDeRelleno.premio}</div><div class="raspa-value-text">$${premioDeRelleno.valor}</div>`;
                            rIndex++;
                        }
                    });

                    document.getElementById('btn-close-raspa').style.display = 'block';

                    msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble cliente">🎫 Jugué al Raspa y Gana Diario</div><span class="status-text">✓ Enviado</span></div>`;
                    msgArea.innerHTML += `<div class="bubble-wrapper"><div class="bubble bot">${data.mensaje}</div></div>`;
                    msgArea.scrollTop = msgArea.scrollHeight;
                    socket.emit('cliente_accion', { estado: 'Menú' }); 
                }, 800);
            })
            .catch(err => {
                alert("Error de conexión al raspar.");
                cerrarRaspaModal();
            });
        }
    </script>
