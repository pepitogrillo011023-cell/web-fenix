<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Casino Fénix</title>
    <link rel="stylesheet" href="/css/index.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-title">
                <div class="status-dot"></div>
                <span id="header-title-text">Chat Asistencia</span>
                <span id="badge-creditos" class="badge-creditos hidden">🟡 <span id="txt-creditos">0</span> CR</span>
            </div>
            <button id="btn-cerrar-sesion" class="btn-logout hidden" onclick="cerrarSesion()">Salir</button>
        </div>

        <div id="vista-login" class="auth-body active">
            <h3>Acceso de Clientes</h3>
            <input type="text" id="login-user" class="input-dark" placeholder="Usuario...">
            <input type="password" id="login-pass" class="input-dark" placeholder="Contraseña...">
            <button class="btn-primary" id="btn-login" onclick="validarAccesoManual()">Ingresar</button>
        </div>

        <div id="vista-chat" class="hidden">
            <div id="hero-welcome-container" class="hero-welcome hidden">
                <h2 id="welcome-name">¡Hola!</h2>
                <p>Bienvenido a Fénix 🦅</p>
            </div>
            <div class="chat-messages" id="messages-area"></div>
            
            <div id="container-menu-options" class="menu-grid" style="display: none;">
                <button class="btn-action" onclick="seleccionarOpcion('Depósito')">💰 Cargar</button>
                <button class="btn-action" onclick="seleccionarOpcion('Retiro')">💸 Retirar</button>
                <button class="btn-action" onclick="seleccionarOpcion('Soporte')">🛠️ Soporte</button>
                <button class="btn-action" onclick="seleccionarOpcion('Referido')">🎁 Referí</button>
                <button class="btn-action" style="grid-column: span 2;" onclick="abrirModal('cargar-creditos')">🟡 Cargar Créditos</button>
                <button class="btn-action btn-tienda" style="grid-column: span 2;" onclick="abrirTienda()">🛒 Tienda</button>
                <button class="btn-action btn-minijuegos" style="grid-column: span 2;" onclick="mostrarSubMenuMinijuegos()">🎮 Minijuegos</button>
            </div>

            <div id="container-games-options" class="menu-grid" style="display: none; grid-template-columns: 1fr 1fr 1fr;">
                <button class="btn-action" onclick="abrirModal('ruleta')">🎯 Ruleta</button>
                <button class="btn-action" onclick="abrirModal('raspa')">🎫 Raspa</button>
                <button class="btn-action" onclick="abrirModal('traga')">🍒 Slots</button>
                <button class="btn-action" style="grid-column: span 1.5;" onclick="abrirModal('cartas')">🃏 Cartas</button>
                <button class="btn-action" style="grid-column: span 1.5;" onclick="abrirModal('moneda')">🪙 Cara/Cruz</button>
                <button class="btn-action btn-premium" style="grid-column: span 3;" onclick="abrirSlotPremium()">💎 JUGAR SLOT PREMIUM 💎</button>
                <button class="btn-action" style="grid-column: span 3; background:#374151;" onclick="irAlMenuPrincipal()">↩️ Volver</button>
            </div>

            <div id="container-deposit-options" class="deposit-grid" style="display: none;">
                <button class="btn-action" onclick="ejecutarAccionDeposito('Subir Comprobante')">📁 Comprobante</button>
                <button class="btn-action" onclick="ejecutarAccionDeposito('Reportar Pago')">📄 Reportar</button>
                <button class="btn-action" style="background:#374151;" onclick="irAlMenuPrincipal()">↩️ Volver</button>
            </div>

            <div id="container-chat-input" class="chat-input-area" style="display: none;">
                <button class="btn-action" style="background:#ef4444; padding:0 15px; margin:0;" onclick="volverYLimpiarChat()">← Menú</button>
                <input type="text" id="client-raw-input" class="input-dark" style="margin:0; flex:1;" placeholder="Escribí acá...">
                <button class="btn-primary" style="margin:0; width:auto; padding:0 15px;" onclick="enviarMensajeLibreCliente()">Enviar</button>
            </div>
        </div>
    </div>
    <script src="/js/index.js"></script>
</body>
</html>
