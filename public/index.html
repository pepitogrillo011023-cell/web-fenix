<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Casino Fénix</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0f19; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        
        .app-container { background-color: #111827; width: 340px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden; border: 1px solid #1f2937; display: flex; flex-direction: column; }
        
        .header { background-color: #1f2937; padding: 15px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #374151; }
        .header-title { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        
        /* PANTALLAS DE LOGIN / REGISTRO */
        .auth-body { padding: 40px 25px; display: flex; flex-direction: column; align-items: center; }
        .auth-body h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; color: white; }
        
        .input-dark { background-color: #1f2937; border: 1px solid #374151; color: white; padding: 12px 15px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; outline: none; transition: border 0.3s; }
        .input-dark:focus { border-color: #38bdf8; }
        .input-dark::placeholder { color: #64748b; }
        
        .btn-primary { background-color: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 14px; cursor: pointer; transition: background 0.3s; margin-top: 5px; }
        .btn-primary:hover { background-color: #1d4ed8; }
        
        .btn-text { background: none; border: none; color: #94a3b8; font-size: 13px; cursor: pointer; margin-top: 15px; text-decoration: underline; }
        .btn-text:hover { color: white; }

        .btn-logout { background-color: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-logout:hover { background-color: #ef4444; color: white; }

        /* PANTALLA DEL CHAT (Oculta al inicio) */
        #vista-chat { display: none; height: 450px; flex-direction: column; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-color: #0b0f19; }
        .chat-input-area { padding: 15px; background-color: #111827; border-top: 1px solid #1f2937; display: flex; gap: 10px; }
        
        /* Utilidad para ocultar pantallas */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="header-title">
                <div class="status-dot"></div>
                Chat Asistencia (En línea)
            </div>
            <button id="btn-cerrar-sesion" class="btn-logout hidden" onclick="cerrarSesion()">Salir</button>
        </div>

        <div id="vista-login" class="auth-body">
            <h3>Acceso de Clientes</h3>
            <input type="text" id="login-user" class="input-dark" placeholder="Tu usuario de casino...">
            <input type="password" id="login-pass" class="input-dark" placeholder="Tu contraseña...">
            <button class="btn-primary" onclick="iniciarSesion()">Ingresar al Chat</button>
            <button class="btn-text" onclick="cambiarVista('registro')">¿No tenés cuenta? Crear usuario</button>
        </div>

        <div id="vista-registro" class="auth-body hidden">
            <h3>Crear Nuevo Usuario</h3>
            <input type="text" id="reg-user" class="input-dark" placeholder="Elegí un nombre de usuario...">
            <input type="password" id="reg-pass" class="input-dark" placeholder="Elegí una contraseña...">
            <button class="btn-primary" style="background-color: #10b981;" onclick="registrarUsuario()">Crear y Entrar</button>
            <button class="btn-text" onclick="cambiarVista('login')">Ya tengo cuenta. Ingresar.</button>
        </div>

        <div id="vista-chat">
            <div class="chat-messages" id="chat-msgs">
                <div style="text-align: center; color: #64748b; font-size: 12px; margin-top: 20px;">Conectando con un operador...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="input-dark" style="margin:0;" placeholder="Escribí tu mensaje...">
                <button class="btn-primary" style="margin:0; width:auto; padding: 0 15px;">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        // Control de vistas
        function cambiarVista(vista) {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-registro').classList.add('hidden');
            document.getElementById('vista-chat').classList.add('hidden');
            document.getElementById('btn-cerrar-sesion').classList.add('hidden');

            if (vista === 'login') {
                document.getElementById('vista-login').classList.remove('hidden');
            } else if (vista === 'registro') {
                document.getElementById('vista-registro').classList.remove('hidden');
            } else if (vista === 'chat') {
                document.getElementById('vista-chat').style.display = 'flex'; // Usamos flex para el chat
                document.getElementById('btn-cerrar-sesion').classList.remove('hidden');
            }
        }

        // Función para Registrar
        async function registrarUsuario() {
            const u = document.getElementById('reg-user').value.trim();
            const p = document.getElementById('reg-pass').value.trim();
            
            if(!u || !p) return alert("Por favor, completá ambos campos.");

            try {
                const res = await fetch('/api/registrar-cliente', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: u, password: p })
                });
                
                const data = await res.json();
                
                if (data.exito) {
                    alert("¡Cuenta creada con éxito! Ya podés ingresar.");
                    document.getElementById('login-user').value = u;
                    document.getElementById('login-pass').value = p;
                    cambiarVista('login');
                } else {
                    alert(data.mensaje); // "El usuario ya existe"
                }
            } catch (e) {
                alert("Error de conexión al registrarse.");
            }
        }

        // Función para Ingresar
        async function iniciarSesion() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();

            if(!u || !p) return alert("Ingresá usuario y contraseña.");

            try {
                const res = await fetch('/api/validar-cliente', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: u, password: p })
                });

                const data = await res.json();
                
                if (data.exito) {
                    cambiarVista('chat');
                    socket.emit('identificar_usuario', { usuario: u });
                } else {
                    alert("Usuario o contraseña incorrectos.");
                }
            } catch (e) {
                alert("Error de conexión con el servidor.");
            }
        }

        // Función para Cerrar Sesión
        function cerrarSesion() {
            socket.disconnect(); // Desconectamos del chat
            socket.connect();    // Reconectamos para un nuevo inicio de sesión limpio
            
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            
            cambiarVista('login');
        }
    </script>
</body>
</html>
