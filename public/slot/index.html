<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Premium - Casino Fénix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="color:#ffaa00; margin-bottom: 10px;">FÉNIX SLOTS</h1>

    <div class="controles-apuesta">
        <label for="apuesta-input">Apuesta:</label>
        <input type="number" id="apuesta-input" value="100" min="10" step="10">
    </div>

    <div id="mensaje-premio">¡Gira para ganar!</div>
    
    <div id="slot-machine-container" class="slot-machine"></div>

    <button id="play-button" class="spin-button">GIRAR AHORA</button>
    <button class="btn-volver" onclick="window.location.href='/'">↩️ Volver al Casino</button>

    <div id="modal-bonus" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">¡Fin del Bonus!</h2>
            <p class="modal-texto">Ganaste en 10 tiradas gratis:<br> <span id="monto-bonus-final" class="modal-monto">$0</span></p>
            <button class="btn-aceptar" onclick="cerrarModal()">Aceptar</button>
        </div>
    </div>

    <script type="text/javascript" src="slot-machine.js"></script>
    <script>
        const usuarioActual = localStorage.getItem('casino_fenix_user');
        
        // 1. MAPEAMOS LAS NUEVAS IMÁGENES
        const baseSymbols = [
            { name: 'laud', position: 0, weight: 1 },
            { name: 'bufon', position: 150, weight: 1 },
            { name: 'zapatos', position: 300, weight: 1 },
            { name: 'bonus', position: 450, weight: 1 },
            { name: 'clavas', position: 600, weight: 1 },
            { name: 'esfera', position: 750, weight: 1 }
        ];

        // 2. TABLA DE PREMIOS (Multiplicadores)
        const tablaPremios = {
            'bufon': 10,
            'laud': 8,
            'clavas': 6,
            'zapatos': 3,
            'esfera': 1
        };

        // Variables de estado
        let girosGratisRestantes = 0;
        let totalGanadoEnGratis = 0;
        let isSpinning = false;
        let slot;

        window.onload = function() {
            const btnGirar = document.getElementById('play-button');
            const container = document.getElementById('slot-machine-container');
            const inputApuesta = document.getElementById('apuesta-input');
            const mensajePremio = document.getElementById('mensaje-premio');

            // INICIALIZAMOS LA MÁQUINA
            slot = slotMachine(container, [
                { imageSrc: '/slot/images/reel-strip1.png', symbols: baseSymbols },
                { imageSrc: '/slot/images/reel-strip1.png', symbols: baseSymbols },
                { imageSrc: '/slot/images/reel-strip1.png', symbols: baseSymbols }
            ], (resultadoFinal) => {
                evaluarPremio(resultadoFinal); // Se ejecuta al terminar de girar
            }, { reelHeight: 150, reelWidth: 100 });

            // FUNCIÓN PRINCIPAL DE GIRO
            async function ejecutarGiro() {
                if (isSpinning) return;
                
                let apuestaActual = parseFloat(inputApuesta.value);
                if (apuestaActual <= 0 || isNaN(apuestaActual)) {
                    alert("Ingresa un monto de apuesta válido.");
                    return;
                }

                isSpinning = true;
                btnGirar.disabled = true;
                inputApuesta.disabled = girosGratisRestantes > 0; // Bloquea la apuesta en tiros gratis

                mensajePremio.innerText = girosGratisRestantes > 0 ? `¡GIRO GRATIS! (${girosGratisRestantes} restantes)` : "Girando...";
                slot.startSpinAnimation();

                // ---------------------------------------------------------
                // SIMULADOR TEMPORAL DE RESULTADOS (Mientras ajustás el servidor)
                // ---------------------------------------------------------
                setTimeout(() => {
                    const todosLosSimbolos = ['laud', 'bufon', 'zapatos', 'bonus', 'clavas', 'esfera'];
                    
                    // Elegimos 3 símbolos al azar
                    const r1 = todosLosSimbolos[Math.floor(Math.random() * todosLosSimbolos.length)];
                    const r2 = todosLosSimbolos[Math.floor(Math.random() * todosLosSimbolos.length)];
                    const r3 = todosLosSimbolos[Math.floor(Math.random() * todosLosSimbolos.length)];
                    
                    // TRUCO PARA PROBAR EL BONUS MÁS FÁCIL (10% de chances de forzar 3 iguales)
                    let rodillosFinales = [r1, r2, r3];
                    if (Math.random() > 0.90) {
                        const premioForzado = todosLosSimbolos[Math.floor(Math.random() * todosLosSimbolos.length)];
                        rodillosFinales = [premioForzado, premioForzado, premioForzado];
                    }

                    // Detenemos la máquina con el resultado aleatorio
                    slot.stopSpinAndShowResult(rodillosFinales);
                }, 1000); // Simulamos 1 segundo de "carga" del servidor
                
                /* // CUANDO EL BACKEND ESTÉ LISTO, BORRÁ EL SIMULADOR DE ARRIBA 
                // Y DESCOMENTÁ ESTO:
                try {
                    const res = await fetch('/api/tirar-slot-premium', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ 
                            usuario: usuarioActual, 
                            apuesta: apuestaActual,
                            esGiroGratis: girosGratisRestantes > 0 
                        }) 
                    });
                    const data = await res.json();
                    
                    if(data.exito) {
                        slot.stopSpinAndShowResult(data.rodillos); 
                    } else {
                        alert(data.mensaje);
                        slot.stopSpinAndShowResult(['esfera', 'esfera', 'esfera']);
                    }
                } catch(e) { 
                    alert("Error de conexión"); 
                    slot.stopSpinAndShowResult(['esfera', 'esfera', 'esfera']);
                }
                */
            }

            // FUNCIÓN DE LÓGICA DE PREMIOS
            function evaluarPremio(rodillos) {
                let apuestaActual = parseFloat(inputApuesta.value);
                const esIgual = (rodillos[0] === rodillos[1] && rodillos[1] === rodillos[2]);
                const simbolo = rodillos[0];

                if (esIgual && simbolo === 'bonus') {
                    if (girosGratisRestantes === 0) {
                        // Activar 10 tiros gratis
                        girosGratisRestantes = 10;
                        totalGanadoEnGratis = 0;
                        mensajePremio.innerText = "¡BONUS ACTIVADO!";
                        setTimeout(ejecutarGiro, 1500); // Dispara el primer giro gratis automático
                        return;
                    } else {
                        // Le damos 10 tiros más si saca bonus dentro del bonus
                        girosGratisRestantes += 10;
                        mensajePremio.innerText = "¡+10 GIROS EXTRAS!";
                    }
                } else if (esIgual && tablaPremios[simbolo]) {
                    // Ganó un premio normal
                    const premio = apuestaActual * tablaPremios[simbolo];
                    
                    if (girosGratisRestantes > 0) {
                        totalGanadoEnGratis += premio; // Acumulamos en el pozo del bonus
                        mensajePremio.innerText = `¡Ganaste $${premio}! (Total Bonus: $${totalGanadoEnGratis})`;
                    } else {
                        mensajePremio.innerText = `¡Ganaste $${premio}!`;
                        // AQUÍ ES DONDE EL BACKEND DEBE SUMARLE LA PLATA AL USUARIO
                    }
                } else {
                    mensajePremio.innerText = girosGratisRestantes > 0 ? "Sigue girando..." : "¡Suerte para la próxima!";
                }

                // GESTIÓN DE FLUJO (¿Sigue tirando solo o se frena?)
                if (girosGratisRestantes > 0) {
                    girosGratisRestantes--;
                    if (girosGratisRestantes === 0) {
                        // Se acabaron los giros gratis -> MOSTRAMOS MODAL
                        document.getElementById('monto-bonus-final').innerText = `$${totalGanadoEnGratis}`;
                        document.getElementById('modal-bonus').style.display = 'flex';
                    } else {
                        // Sigue girando automáticamente
                        setTimeout(ejecutarGiro, 1500);
                    }
                } else {
                    // Terminó el giro normal
                    isSpinning = false;
                    btnGirar.disabled = false;
                    inputApuesta.disabled = false;
                }
            }

            // Evento del botón
            btnGirar.addEventListener('click', ejecutarGiro);
        };

        // Función para cerrar la ventana del bonus
        function cerrarModal() {
            document.getElementById('modal-bonus').style.display = 'none';
            // Reseteamos el estado para que pueda volver a jugar normal
            isSpinning = false;
            document.getElementById('play-button').disabled = false;
            document.getElementById('apuesta-input').disabled = false;
            document.getElementById('mensaje-premio').innerText = "¡Gira para ganar!";
        }
    </script>
</body>
</html>
