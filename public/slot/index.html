<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Premium - Casino Fénix</title>
    <style>
        /* ESTILOS INTEGRADOS PARA ASEGURAR QUE TODO FUNCIONE */
        body { margin: 0; background: linear-gradient(135deg, #0f0c29, #302b63); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        
        /* Contenedor principal de la máquina */
        .slot-machine { display: flex; justify-content: center; gap: 10px; background: #000; padding: 20px; border: 4px solid #ffaa00; border-radius: 15px; margin-bottom: 20px; }
        
        /* CADA REEL (RODILLO) ES LA CLAVE */
        .reel { 
            width: 100px; 
            height: 150px; 
            background-color: white; 
            border-radius: 5px; 
            background-image: url('images/reel-strip1.png'); 
            background-repeat: repeat-y;
            background-size: 100px auto; /* FUERZA QUE LA IMAGEN MIDA 100PX DE ANCHO */
            background-position: 0px 0px; 
        }

        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .spin-button { background: #f59e0b; padding: 20px 50px; border: none; border-radius: 50px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
        .btn-volver { background: #374151; padding: 12px 25px; border: none; border-radius: 8px; color: white; cursor: pointer; text-decoration: none; }
        #mensaje-premio { font-size: 24px; color: #a3e635; height: 30px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1 style="color:#ffaa00; margin-bottom: 20px;">FÉNIX SLOTS</h1>
    <div id="mensaje-premio"></div>
    
    <div id="slot-machine-container" class="slot-machine"></div>

    <div class="controls">
        <button id="play-button" class="spin-button">GIRAR AHORA</button>
        <button class="btn-volver" onclick="window.location.href='/'">↩️ Volver al Casino</button>
    </div>

    <script type="text/javascript" src="slot-machine.js"></script>
    <script>
        const usuarioActual = localStorage.getItem('casino_fenix_user');
        
        // Configuración de símbolos acorde a la tira de imágenes
        const baseSymbols = [
            { name: 'symbol1', position: 0, weight: 1 },
            { name: 'symbol2', position: 150, weight: 1 },
            { name: 'symbol3', position: 300, weight: 1 }
        ];

        window.onload = function() {
            const container = document.getElementById('slot-machine-container');
            
            // Inicializar máquina
            const slot = slotMachine(container, [
                { imageSrc: 'images/reel-strip1.png', symbols: baseSymbols },
                { imageSrc: 'images/reel-strip1.png', symbols: baseSymbols },
                { imageSrc: 'images/reel-strip1.png', symbols: baseSymbols }
            ], null, { reelHeight: 150, reelWidth: 100 });

            document.getElementById('play-button').addEventListener('click', async () => {
                document.getElementById('play-button').disabled = true;
                slot.startSpinAnimation();
                
                try {
                    const res = await fetch('/api/tirar-slot-premium', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ usuario: usuarioActual }) 
                    });
                    const data = await res.json();
                    
                    if(data.exito) {
                        slot.stopSpinAndShowResult(data.rodillos);
                        document.getElementById('mensaje-premio').innerText = "¡Ganaste!";
                    } else {
                        alert(data.mensaje);
                        slot.stopSpinAndShowResult(['symbol1', 'symbol1', 'symbol1']);
                    }
                } catch(e) { alert("Error"); }
                document.getElementById('play-button').disabled = false;
            });
        };
    </script>
</body>
</html>
