<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slot Premium - Casino Fénix</title>
    
    <style>
        /* ESTILOS FORZADOS PARA EL SLOT */
        body { margin: 0; background: linear-gradient(135deg, #0f0c29, #302b63); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        
        /* Contenedor principal de la máquina */
        .slot-machine { display: flex; justify-content: center; background: #000; padding: 20px; border: 4px solid #ffaa00; border-radius: 15px; margin-bottom: 20px; }
        
        /* ESTO CORRIGE LAS CAJAS BLANCAS */
        .reel { width: 100px; height: 150px; overflow: hidden; position: relative; border: 2px solid #374151; background-color: #000; }
        
        /* Aseguramos que la tira de imágenes se vea */
        .strip { list-style: none; padding: 0; margin: 0; position: absolute; width: 100%; }
        .strip li { height: 150px; background-size: 100px 150px; background-repeat: no-repeat; }

        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }
        .spin-button { background: linear-gradient(135deg, #f59e0b, #d97706); padding: 20px 40px; border: none; border-radius: 50px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
        .btn-volver { background: #374151; padding: 12px 30px; border: none; border-radius: 8px; color: white; cursor: pointer; }
        
        #mensaje-premio { font-size: 24px; color: #a3e635; height: 35px; margin-bottom: 10px; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <h1 style="color:#ffaa00; margin-bottom: 10px;">FÉNIX SLOTS</h1>
    <div id="mensaje-premio"></div>
    
    <div id="slot-machine-container" class="slot-machine"></div>

    <div class="controls">
        <button id="play-button" class="spin-button">GIRAR AHORA</button>
        <button class="btn-volver" onclick="window.location.href='/'">↩️ Volver al Casino</button>
    </div>

    <script type="text/javascript" src="slot-machine.js"></script>

    <script>
        const usuarioActual = localStorage.getItem('casino_fenix_user');
        
        // CONFIGURACIÓN DE SÍMBOLOS
        // Ajustamos la posición para que coincida con tu imagen
        const baseSymbols = [
            { name: 'cherry', position: 0, weight: 1 },
            { name: 'lemon', position: 150, weight: 1 },
            { name: 'diamond', position: 300, weight: 1 }
        ];

        // RUTA ABSOLUTA FORZADA
        const imgPath = '/slot/images/reel-strip1.png';

        window.onload = function() {
            const container = document.getElementById('slot-machine-container');
            
            // Inicializar máquina
            const slot = slotMachine(container, [
                { imageSrc: imgPath, symbols: baseSymbols },
                { imageSrc: imgPath, symbols: baseSymbols },
                { imageSrc: imgPath, symbols: baseSymbols }
            ], null, { reelHeight: 150, reelWidth: 100 });

            document.getElementById('play-button').addEventListener('click', async () => {
                document.getElementById('play-button').disabled = true;
                slot.startSpinAnimation();
                
                try {
                    const res = await fetch('/api/tirar-slot-premium', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ usuario: usuarioActual }) 
                    });
                    const data = await res.json();
                    
                    if(data.exito) {
                        slot.stopSpinAndShowResult(data.rodillos);
                        document.getElementById('mensaje-premio').innerText = "¡Ganaste!";
                    } else {
                        alert(data.mensaje);
                        // Frenar en una posición segura si falla
                        slot.stopSpinAndShowResult(['cherry', 'cherry', 'cherry']);
                    }
                } catch(e) { 
                    alert("Error de conexión"); 
                } finally {
                    document.getElementById('play-button').disabled = false;
                }
            });
        };
    </script>
</body>
</html>
