<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Club Fenix</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0f19; font-family: 'Segoe UI', sans-serif; color: #cbd5e1; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background-color: #111827; border-right: 1px solid #1f2937; padding: 20px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex-shrink: 0; }
        .nav-btn { background: none; border: none; color: #94a3b8; text-align: left; padding: 10px 12px; font-size: 13.5px; font-weight: 600; cursor: pointer; border-radius: 6px; width: 100%; transition: all 0.2s; }
        .nav-btn.active-nav { color: #38bdf8; background-color: #1f2937; box-shadow: inset 4px 0 0 #38bdf8; }
        .main-content { flex: 1; display: flex; flex-direction: column; background-color: #0f172a; }
        .top-bar { height: 60px; background-color: #111827; border-bottom: 1px solid #1f2937; display: flex; align-items: center; padding: 0 30px; font-weight: bold; color: #f8fafc; }
        .workspace { flex: 1; display: flex; overflow: hidden; position: relative; }
        .view-section { display: none; width: 100%; height: 100%; flex-direction: column; padding: 20px; overflow-y: auto; }
        .view-section.active-view { display: flex; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; }
        .modal-box { width: 450px; background: #111827; margin: 100px auto; padding: 25px; border-radius: 12px; border: 1px solid #374151; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>⚡ Club Fenix</h2>
        <button id="btn-nav-chats" class="nav-btn active-nav" onclick="cambiarSeccion('chats')">💬 Chats en Vivo</button>
        <button id="btn-nav-usuarios" class="nav-btn" onclick="cambiarSeccion('usuarios')">👥 Usuarios Internos</button>
        <button id="btn-nav-clientes" class="nav-btn" onclick="cambiarSeccion('clientes')">📇 Datos de Clientes</button>
        <button id="btn-nav-retiros" class="nav-btn" onclick="cambiarSeccion('retiros')">💸 Control de Retiros</button>
        <button id="btn-nav-apis" class="nav-btn" onclick="cambiarSeccion('apis')">🔗 Configuración APIs</button>
        <button class="nav-btn" onclick="abrirImportador()" style="color: #f59e0b;">📥 Importar Datos</button>
    </div>

    <div class="main-content">
        <div class="top-bar" id="panel-title">Panel de Control</div>
        <div class="workspace">
            <div id="section-chats" class="view-section active-view"><h3>Chats en Vivo</h3></div>
            <div id="section-usuarios" class="view-section"><h3>Usuarios Internos</h3></div>
            <div id="section-clientes" class="view-section"><h3>Datos de Clientes</h3></div>
            <div id="section-retiros" class="view-section"><h3>Control de Retiros</h3></div>
            <div id="section-apis" class="view-section"><h3>Configuración APIs</h3></div>
        </div>
    </div>

    <div id="modalImportador" class="modal-overlay">
        <div class="modal-box">
            <h3>Importar de Ganamos.net</h3>
            <textarea id="dataPaste" style="width:100%; height:150px; background:#0f172a; color:#cbd5e1; border:1px solid #374151;"></textarea>
            <button onclick="procesarDatos()" style="width:100%; margin-top:15px; padding:10px;">Actualizar Base de Datos</button>
            <button onclick="cerrarImportador()" style="width:100%; margin-top:5px; padding:10px;">Cancelar</button>
        </div>
    </div>

    <script>
        const socket = io();
        
        function cambiarSeccion(seccion) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active-view'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('section-' + seccion).classList.add('active-view');
            document.getElementById('btn-nav-' + seccion).classList.add('active-nav');
            document.getElementById('panel-title').innerText = "Panel de Control - " + seccion.toUpperCase();
        }

        function abrirImportador() { document.getElementById('modalImportador').style.display = 'block'; }
        function cerrarImportador() { document.getElementById('modalImportador').style.display = 'none'; }
        
        async function procesarDatos() {
            const texto = document.getElementById('dataPaste').value;
            try {
                const res = await fetch('/importar-datos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ datosCrudos: texto })
                });
                const result = await res.json();
                alert(result.mensaje);
                cerrarImportador();
            } catch(e) { alert('Error al procesar'); }
        }
    </script>
</body>
</html>
